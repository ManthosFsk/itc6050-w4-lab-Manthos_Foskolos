version: 2

models:
  - name: stg_order_items
    description: "Cleaned order item data from the OLTP shop schema."

    columns:
      - name: order_item_id
        tests:
          - unique
          - not_null

      - name: order_id
        tests:
          - not_null

      - name: product_id
        tests:
          - not_null

      - name: quantity
        tests:
          - not_null

      - name: unit_price_usd
        tests:
          - not_null